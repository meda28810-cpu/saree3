<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAREE3 | BRAZILI QQ 👑</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffcc00; --red: #e63946; --dark: #0d1117;
            --card: #161b22; --text: #f0f6fc; --blue: #58a6ff;
        }

        body {
            font-family: 'Cairo', sans-serif; background-color: var(--dark);
            color: var(--text); margin: 0; padding: 0; transition: 0.3s;
        }

        /* زر تبديل اللغة */
        .lang-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: var(--card); border: 1px solid #30363d; color: var(--gold);
            padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

        .container { max-width: 480px; margin: 0 auto; width: 92%; padding-bottom: 40px; }

        /* الشاشة الرئيسية */
        .hero { text-align: center; padding: 50px 20px 30px; }
        .hero h1 { font-size: 50px; color: var(--gold); margin: 0; font-weight: 900; letter-spacing: 2px; }
        .dev-tag { font-size: 10px; letter-spacing: 3px; color: #484f58; font-weight: bold; }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .menu-card {
            background: var(--card); border: 1px solid #30363d; border-radius: 25px;
            padding: 30px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .menu-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .menu-card h2 { margin: 15px 0 5px; font-size: 26px; font-weight: 900; }

        /* الصفحات الداخلية */
        .page { display: none; animation: slideUp 0.5s ease; padding-top: 20px; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

        .back-btn { background: none; border: 1px solid #30363d; color: #8b949e; padding: 8px 20px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }

        /* التصميم المشترك للمدخلات */
        label { display: block; margin: 15px 5px 8px; color: #8b949e; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        select, input, textarea {
            width: 100%; padding: 16px; border-radius: 15px; border: 2px solid #30363d;
            background: rgba(48, 54, 61, 0.2); color: white; font-size: 16px; box-sizing: border-box; outline: none;
        }
        select:focus, input:focus { border-color: var(--gold); }

        /* نظام المتبرعين (UI فخم) */
        .blood-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .blood-card {
            background: #21262d; border: 2px solid #30363d; border-radius: 12px;
            padding: 15px 0; text-align: center; cursor: pointer; font-weight: 900; color: #8b949e; transition: 0.3s;
        }
        .blood-card.active { border-color: var(--red); color: var(--red); background: #2d1618; box-shadow: 0 0 15px rgba(230, 57, 70, 0.3); }

        .btn-action {
            width: 100%; height: 60px; border-radius: 18px; border: none;
            color: white; font-size: 18px; font-weight: 900; margin-top: 30px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* لوحة التحكم السرية */
        .admin-row {
            background: #161b22; padding: 15px; border-radius: 15px; border: 1px solid #30363d;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border-right: 5px solid var(--red);
        }
    </style>
</head>
<body>

<button class="lang-btn" onclick="toggleLang()" id="lBtn">EN</button>

<div class="container">
    <div id="home-page" class="page" style="display: block;">
        <div class="hero">
            <div class="dev-tag">DEVELOPED BY BRAZILI QQ</div>
            <h1>SAREE3</h1>
            <p id="h-sub" style="color: #8b949e;">الولي للخدمات الذكية</p>
        </div>
        <div class="menu-grid">
            <div class="menu-card" onclick="showPage('m-page')">
                <div style="font-size: 45px;">🛠️</div>
                <h2 id="m-tit">خدمة الصيانة</h2>
                <p style="color: var(--gold);">Maintenance Service</p>
            </div>
            <div class="menu-card" onclick="showPage('b-page')">
                <div style="font-size: 45px;">🩸</div>
                <h2 id="b-tit">بنك الدم</h2>
                <p style="color: var(--red);">Blood Donors</p>
            </div>
        </div>
    </div>

    <div id="m-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">🔙 رجوع</button>
        <h2 style="color: var(--gold); font-size: 30px;">طلب صيانة</h2>
        <label id="l-loc">الحي السكني:</label>
        <select id="loc"><option>حي المسجد العتيق</option><option>حي الرحمه</option><option>حي فريق قدام</option><option>حي نادي الشعله</option></select>
        <label id="l-dev">نوع الجهاز:</label>
        <select id="dev"><option>مكيف</option><option>ثلاجة</option><option>غسالة</option><option>شاشة</option></select>
        <button class="btn-action" style="background: var(--gold); color: black;" onclick="sendM()">إرسال الطلب ✅</button>
    </div>

    <div id="b-page" class="page">
        <button class="back-btn" onclick="showPage('home-page')">🔙 رجوع</button>
        <h2 style="color: var(--red); font-size: 30px;">نظام المتبرعين</h2>
        
        <div id="donor-form">
            <label id="l-name">الاسم الكامل (أو كود الإدارة):</label>
            <input type="text" id="b-name" placeholder="ادخل اسمك هنا..." oninput="checkAdmin(this.value)">
            
            <div id="donor-ui">
                <label id="l-type">فصيلة الدم:</label>
                <div class="blood-grid">
                    <div class="blood-card" onclick="selB(this, 'A+')">A+</div><div class="blood-card" onclick="selB(this, 'O+')">O+</div>
                    <div class="blood-card" onclick="selB(this, 'B+')">B+</div><div class="blood-card" onclick="selB(this, 'AB+')">AB+</div>
                    <div class="blood-card" onclick="selB(this, 'A-')">A-</div><div class="blood-card" onclick="selB(this, 'O-')">O-</div>
                    <div class="blood-card" onclick="selB(this, 'B-')">B-</div><div class="blood-card" onclick="selB(this, 'AB-')">AB-</div>
                </div>
                <button class="btn-action" style="background: var(--red);" onclick="saveB()">تسجيل البيانات 🩸</button>
            </div>
        </div>

        <div id="admin-panel" style="display: none;">
            <h3 style="color: var(--gold); text-align: center;">لوحة إدارة BRAZILI QQ</h3>
            <div id="admin-list"></div>
            <button class="btn-action" style="background: #333;" onclick="location.reload()">تسجيل خروج</button>
        </div>
    </div>
</div>

<script>
    let curLang = 'AR';
    let selType = '';
    let db = JSON.parse(localStorage.getItem('brazili_db')) || [];

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.style.display = 'none');
        document.getElementById(p).style.display = 'block';
        window.scrollTo(0,0);
    }

    function toggleLang() {
        const h = document.getElementById('htmlTag');
        const b = document.getElementById('lBtn');
        if(curLang === 'AR') { h.dir='ltr'; b.innerText='AR'; curLang='EN'; updateT('EN'); }
        else { h.dir='rtl'; b.innerText='EN'; curLang='AR'; updateT('AR'); }
    }

    function updateT(l) {
        const t = {
            'AR': { h:"الولي للخدمات الذكية", m:"خدمة الصيانة", b:"بنك الدم", loc:"الحي السكني:", dev:"الجهاز:", name:"الاسم الكامل:", type:"فصيلة الدم:" },
            'EN': { h:"Smart Community Services", m:"Maintenance Service", b:"Blood Bank", loc:"Location:", dev:"Device:", name:"Full Name:", type:"Blood Type:" }
        };
        document.getElementById('h-sub').innerText = t[l].h;
        document.getElementById('m-tit').innerText = t[l].m;
        document.getElementById('b-tit').innerText = t[l].b;
        document.getElementById('l-loc').innerText = t[l].loc;
        document.getElementById('l-dev').innerText = t[l].dev;
        document.getElementById('l-name').innerText = t[l].name;
        document.getElementById('l-type').innerText = t[l].type;
    }

    function selB(el, t) {
        document.querySelectorAll('.blood-card').forEach(x => x.classList.remove('active'));
        el.classList.add('active'); selType = t;
    }

    function saveB() {
        const n = document.getElementById('b-name').value;
        if(!n || !selType) return alert("أكمل البيانات!");
        db.push({name: n, type: selType});
        localStorage.setItem('brazili_db', JSON.stringify(db));
        alert("تم الحفظ بنجاح ✅");
        location.reload();
    }

    function checkAdmin(v) {
        if(v === "BRAZILI QQ") {
            document.getElementById('donor-ui').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            const list = document.getElementById('admin-list');
            list.innerHTML = db.map(i => `<div class="admin-row"><span>${i.name}</span><b style="color:var(--red)">${i.type}</b></div>`).join('');
        }
    }

    function sendM() {
        const l = document.getElementById('loc').value;
        const d = document.getElementById('dev').value;
        window.location.href = `https://wa.me/249112002802?text=*Order SAREE3*%0A📍 ${l}%0A🛠️ ${d}%0A_SYSTEM BY BRAZILI QQ_`;
    }
</script>

</body>
</html>
