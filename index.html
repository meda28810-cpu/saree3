<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAREE3 | Maintenance</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3259/3259364.png">
    
    <style>
        :root { --gold: #ffcc00; --green: #28a745; --blue: #007bff; --dark: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 0; }
        
        .dev-name {
            text-align: center; font-weight: 900; font-size: 14px; letter-spacing: 3px;
            color: var(--gold); margin-top: 15px; text-shadow: 0 0 10px var(--gold);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }

        .hero {
            width: 100%; height: 180px;
            background: linear-gradient(rgba(0,0,0,0.7), var(--dark)), 
                        url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?auto=format&fit=crop&w=800&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .app-container {
            max-width: 450px; margin: -20px auto 30px; width: 90%;
            background: var(--card); border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid #333;
            box-sizing: border-box;
        }

        /* العناوين بالإنجليزية */
        .label-en { display: block; text-align: left; margin: 15px 5px 8px; color: var(--gold); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        
        select, textarea {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333;
            background: #222; color: white; font-size: 16px; outline: none; box-sizing: border-box;
            text-align: right; /* خيارات القائمة تظل عربية */
        }

        .payment-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .pay-card {
            background: #222; border: 2px solid transparent; border-radius: 15px;
            padding: 12px; cursor: pointer; text-align: center; transition: 0.3s; font-size: 11px; font-weight: bold;
        }
        .pay-card.active { border-color: var(--gold); background: #333; color: var(--gold); }

        #bank-card {
            display: none; background: #1a1a1a; border: 1px solid var(--gold);
            border-radius: 15px; padding: 15px; margin-top: 15px; text-align: center;
        }

        .buttons-wrapper { display: flex; gap: 10px; margin-top: 25px; }
        .btn-action {
            flex: 1; height: 55px; border-radius: 15px; border: none;
            font-size: 16px; font-weight: 800; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: 0.3s; text-transform: uppercase;
        }
        .btn-whatsapp { background: var(--green); }
        .btn-call { background: var(--blue); }

        #thanks-popup {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

<div class="dev-name">DEVELOPED BY BRAZILI</div>

<div class="hero">
    <h1 style="color: var(--gold); font-size: 35px; margin: 0; letter-spacing: 2px;">SAREE3</h1>
    <p style="font-size: 12px; color: #aaa;">Expert Maintenance Services</p>
</div>

<div class="app-container">
    <label class="label-en">Select Location:</label>
    <select id="loc">
        <option value="" disabled selected>-- اختر الحي السكني --</option>
        <option>حي المسجد العتيق</option>
        <option>حي الرحمه</option>
        <option>حي فريق قدام</option>
        <option>حي نادي الشعله</option>
        <option>حي نادي اتحاد الولي</option>
    </select>

    <label class="label-en">Device Type:</label>
    <select id="device">
        <option value="" disabled selected>-- اختر نوع الجهاز --</option>
        <option>مكيف</option>
        <option>ثلاجة</option>
        <option>غسالة</option>
        <option>شاشة</option>
    </select>

    <label class="label-en">Problem Description:</label>
    <textarea id="desc" rows="2" placeholder="وصف المشكلة باختصار..."></textarea>

    <label class="label-en">Payment Method:</label>
    <div class="payment-grid">
        <div class="pay-card active" onclick="setPayment(this, 'نقداً')">CASH<br>نقداً</div>
        <div class="pay-card" onclick="setPayment(this, 'بنكك')">BANKAK<br>بنكك</div>
        <div class="pay-card" onclick="setPayment(this, 'أوكاش')">O-CASH<br>أوكاش</div>
    </div>

    <div id="bank-card">
        <span style="font-size: 12px; color: #aaa;">حساب بنك الخرطوم:</span><br>
        <b style="color:var(--gold); font-size:20px;">4063324</b>
    </div>

    <div class="buttons-wrapper">
        <button class="btn-action btn-whatsapp" onclick="sendOrder()">WHATSAPP</button>
        <a href="tel:0112002802" class="btn-action btn-call">CALL US</a>
    </div>
</div>

<div id="thanks-popup">
    <h1 style="color: var(--gold);">THANK YOU!</h1>
    <p style="padding: 20px; font-size: 16px;">تم استلام طلبك بنجاح.. جاري التحويل للواتساب</p>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }

    let currentPayment = "نقداً";
    function setPayment(el, method) {
        document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); currentPayment = method;
        document.getElementById('bank-card').style.display = (method === 'بنكك') ? 'block' : 'none';
    }

    function sendOrder() {
        const l = document.getElementById('loc').value;
        const d = document.getElementById('device').value;
        const s = document.getElementById('desc').value || "لا يوجد وصف";
        if(!l || !d) { alert("يرجى اختيار الحي والجهاز!"); return; }

        document.getElementById('thanks-popup').style.display = 'flex';
        const msg = `*SAREE3 ORDER*%0A📍 الحي: ${l}%0A🛠️ الجهاز: ${d}%0A📝 المشكلة: ${s}%0A💰 الدفع: ${currentPayment}%0A_SYSTEM BY BRAZILI_`;
        
        setTimeout(() => { window.location.href = `https://wa.me/249112002802?text=${msg}`; }, 2000);
    }
</script>

</body>
</html>
