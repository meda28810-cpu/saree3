<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سريع | SAREE3 - صيانة الولي الفاخرة</title>
    <style>
        :root {
            --gold: #ffcc00;
            --gold-dark: #b8860b;
            --green: #28a745;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
        }
        .container {
            max-width: 480px; width: 100%;
            background: var(--card-bg); border-radius: 30px;
            padding: 25px; border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }
        .container::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
        }
        .logo-area { margin-bottom: 20px; text-align: center; }
        .logo-text { font-size: 32px; font-weight: 900; color: var(--gold); letter-spacing: 2px; margin: 0; }
        .sub-text { font-size: 14px; color: #aaa; margin-top: 5px; }

        label { display: block; text-align: right; margin: 15px 5px 8px; color: var(--gold); font-size: 14px; font-weight: bold; }
        
        select, textarea {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333;
            background: #252525; color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 204, 0, 0.1); }

        .payment-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 10px; }
        .pay-card {
            background: #252525; border: 2px solid transparent; border-radius: 18px;
            padding: 12px; cursor: pointer; transition: 0.4s; text-align: center; font-size: 14px;
        }
        .pay-card.active { border-color: var(--gold); background: #333; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2); }
        .pay-card span { font-size: 22px; display: block; margin-bottom: 5px; }

        .btn-send {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #28a745, #1e7e34);
            color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold;
            margin-top: 25px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        /* نافذة الشكر */
        #thanks-msg {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; border: 2px solid var(--gold); padding: 30px;
            border-radius: 20px; z-index: 1000; text-align: center; width: 85%;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .footer { margin-top: 30px; font-size: 11px; color: #555; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <h1 class="logo-text">سريع | SAREE3</h1>
        <div class="sub-text">بإدارة نظام BRAZILI الإحترافي 💎</div>
    </div>

    <label>📍 الحي السكني (الولي):</label>
    <select id="loc">
        <option>حي المسجد العتيق</option>
        <option>حي الرحمه</option>
        <option>حي فريق قدام</option>
        <option>حي نادي الشعله</option>
        <option>حي نادي اتحاد الولي</option>
    </select>

    <label>🛠️ نوع الجهاز:</label>
    <select id="device">
        <option>مكيف (سبليت/شباك)</option>
        <option>ثلاجة / ديب فريزر</option>
        <option>غسالة (أوتوماتيك/عادية)</option>
        <option>شاشة / ريسيفر</option>
        <option>أخرى</option>
    </select>

    <label>📝 وصف المشكلة:</label>
    <textarea id="desc" rows="2" placeholder="اشرح لنا العطل باختصار لخدمتك بشكل أفضل..."></textarea>

    <label>💰 طريقة الدفع المفضلة:</label>
    <div class="payment-grid">
        <div class="pay-card active" onclick="selectPay(this, 'نقداً')"><span>💵</span>نقداً</div>
        <div class="pay-card" onclick="selectPay(this, 'بنكك')"><span>🏦</span>بنكك</div>
        <div class="pay-card" onclick="selectPay(this, 'أوكاش')"><span>📱</span>أوكاش</div>
    </div>

    <button class="btn-send" onclick="sendOrder()">إرسال الطلب الآن ✅</button>

    <div class="footer">
        جميع الحقوق محفوظة لنظام BRAZILI © 2026<br>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=https://meda28810-cpu.github.io/saree3/&color=ffcc00&bgcolor=1a1a1a" style="margin-top:15px; border-radius: 10px;">
    </div>
</div>

<div id="thanks-msg">
    <h2 style="color:var(--gold)">تم استلام طلبك! 😊</h2>
    <p>شكراً لثقتك في "سريع". سيتم تحويلك الآن إلى الواتساب لتأكيد الموعد مع الفني.</p>
    <p style="font-size: 12px; color: #aaa;">نحن فخورون بخدمة أهالي الولي.</p>
</div>

<script>
    let selectedPayment = "نقداً";
    function selectPay(element, method) {
        document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        selectedPayment = method;
    }

    function sendOrder() {
        const loc = document.getElementById('loc').value;
        const dev = document.getElementById('device').value;
        const desc = document.getElementById('desc').value;
        const phone = "249112002802"; // رقمك تم تعديله هنا ✅

        const message = `*طلب صيانة جديد (سريع - الولي)*%0A📍 الحي: ${loc}%0A🛠️ الجهاز: ${dev}%0A📝 العطل: ${desc}%0A💰 الدفع: ${selectedPayment}%0A------------------%0A_شكراً لاختياركم نظام BRAZILI_`;
        
        document.getElementById('thanks-msg').style.display = 'block';

        setTimeout(() => {
            window.location.href = `https://wa.me/${phone}?text=${message}`;
        }, 2500);
    }
</script>

</body>
</html>
