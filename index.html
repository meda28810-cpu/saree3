<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAREE3 | BRAZILI QQ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --dark: #0d1117; --card: #161b22; --blue: #007bff; --green: #28a745; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid #30363d; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        h1 { color: var(--gold); font-size: 50px; margin-bottom: 5px; font-weight: 900; }
        
        input, select, textarea { 
            width: 100%; padding: 20px; margin: 12px 0; border-radius: 15px; 
            border: 2px solid #444; background: #0d1117; color: white; 
            font-size: 18px; outline: none; box-sizing: border-box; font-family: 'Cairo';
        }
        textarea { height: 120px; resize: none; }

        .btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; font-size: 22px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); }
        .btn-blue { background: var(--blue); color: white; box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); margin-top: 15px; font-size: 16px; padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; }

        .menu-card { 
            background: var(--card); border: 2px solid #30363d; border-radius: 25px; 
            padding: 35px 20px; margin-bottom: 25px; cursor: pointer;
        }
        .menu-card h3 { font-size: 28px; margin-top: 15px; }

        .driver-card { 
            background: #1c2128; padding: 20px; border-radius: 20px; 
            margin-bottom: 15px; display: flex; justify-content: space-between; 
            align-items: center; border: 2px solid #333; border-right: 5px solid var(--blue);
        }
        .call-btn { 
            background: var(--green); color: white; padding: 12px 20px; 
            border-radius: 15px; text-decoration: none; font-weight: 900; font-size: 18px; 
        }

        .back-btn { background:none; color:var(--gold); border:none; font-size: 20px; font-weight:bold; float:right; cursor:pointer; padding: 10px; }
        label { display: block; text-align: right; color: #8b949e; font-size: 14px; margin-right: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="login-page" class="page">
        <div class="container" style="margin-top: 40px;">
            <h1>SAREE3</h1>
            <h2 style="color: var(--gold);">تسجيل الدخول</h2>
            <p style="color: #8b949e;">أدخل رقم هاتفك للمتابعة</p>
            <input type="text" id="login-phone" placeholder="رقم الهاتف">
            <input type="password" id="login-pass" placeholder="كلمة السر">
            <button class="btn btn-gold" onclick="login()">دخول ✅</button>
            <button class="btn-outline" onclick="show('register-page')">ليس لديك حساب؟ سجل الآن</button>
        </div>
    </div>

    <div id="register-page" class="page">
        <div class="container" style="margin-top: 40px;">
            <h2 style="color: var(--gold);">إنشاء حساب جديد</h2>
            <input type="text" id="reg-name" placeholder="الاسم الكامل">
            <input type="tel" id="reg-phone" placeholder="رقم الهاتف (01...)">
            <input type="password" id="reg-pass" placeholder="اختر كلمة سر">
            <button class="btn btn-gold" onclick="register()">إنشاء الحساب ✨</button>
            <button class="btn-outline" onclick="show('login-page')">لديك حساب؟ سجل دخول</button>
        </div>
    </div>

    <div id="home" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
             <button class="btn-outline" style="width: auto; margin:0;" onclick="logout()">خروج ⬅️</button>
             <h1 style="font-size: 35px; margin: 0;">SAREE3</h1>
        </div>
        <p id="welcome-msg" style="color: var(--gold); font-weight: bold; margin: 20px 0;"></p>
        
        <div class="menu-card" onclick="show('m-page')" style="border-bottom: 6px solid var(--gold);">
            <span style="font-size: 50px;">🛠️</span><h3>خدمة الصيانة</h3>
        </div>

        <div class="menu-card" onclick="show('trip-page')" style="border-bottom: 6px solid var(--blue);">
            <span style="font-size: 50px;">🚕</span><h3>مشوار</h3>
        </div>
        
        <p style="font-size: 10px; color: #333; letter-spacing: 2px;">DESIGNED BY BRAZILI QQ</p>
    </div>

    <div id="m-page" class="page">
        <div class="container">
            <button class="back-btn" onclick="show('home')">🔙 رجوع</button>
            <div style="clear:both;"></div>
            <h2 style="color: var(--gold); font-size: 32px;">طلب صيانة</h2>
            <label>اختر الحي:</label>
            <select id="m-loc">
                <option>حي المسجد العتيق</option><option>حي الرحمه</option>
                <option>حي فريق قدام</option><option>حي نادي الشعله</option><option>حي نادي اتحاد الولي</option>
            </select>
            <label>نوع الجهاز:</label>
            <select id="m-dev">
                <option>مكيف</option><option>ثلاجة</option><option>غسالة</option><option>شاشة</option>
            </select>
            <label>وصف المشكلة:</label>
            <textarea id="m-problem" placeholder="اشرح المشكلة بالتفصيل هنا..."></textarea>
            <button class="btn btn-gold" onclick="sendM()">إرسال الطلب عبر واتساب ✅</button>
        </div>
    </div>

    <div id="trip-page" class="page">
        <div class="container">
            <button class="back-btn" onclick="show('home')">🔙 رجوع</button>
            <div style="clear:both;"></div>
            <h2 style="color: var(--blue); font-size: 32px;">دليل المشاوير</h2>
            <div style="text-align: right;">
                <h3 style="color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 5px;">📍 مشاوير داخلية</h3>
                <div class="driver-card">
                    <div style="text-align: right;"><h4>عمر عبد الله</h4><p>ركشة</p></div>
                    <a href="tel:0121606445" class="call-btn">📞 اتصال</a>
                </div>
                <h3 style="color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px;">🏙️ سفر الحصاحيصا</h3>
                <div class="driver-card">
                    <div style="text-align: right;"><h4>عبد الجليل يوسف</h4><p>ACCENT</p></div>
                    <a href="tel:0117655646" class="call-btn">📞 اتصال</a>
                </div>
                <div class="driver-card">
                    <div style="text-align: right;"><h4>جابر عبد الجليل</h4><p>حافلة</p></div>
                    <a href="tel:0127879864" class="call-btn">📞 اتصال</a>
                </div>
            </div>
        </div>
    </div>

<script>
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        window.scrollTo(0,0);
    }

    // --- نظام العضوية ودخول المطور ---
    function login() {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        // كود المطور السري (BRAZILI)
        if(phone === "BRAZILI") {
            const devUser = { name: "مطور النظام 👑", phone: "BRAZILI-DEV", isDev: true };
            localStorage.setItem('currentUser', JSON.stringify(devUser));
            checkLoginStatus();
            return;
        }

        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.phone === phone && u.pass === pass);
        
        if(user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
            checkLoginStatus();
        } else {
            alert("رقم الهاتف أو كلمة السر غير صحيحة!");
        }
    }

    function register() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || !pass) return alert("يرجى ملء جميع الحقول!");

        const askForCode = confirm("لضمان الأمان، سيتم تحويلك لطلب كود تفعيل من الإدارة.\n\nهل تود المتابعة؟");
        
        if(askForCode) {
            window.open(`https://wa.me/249112002802?text=أريد كود تفعيل لتطبيق سريع%0Aالاسم: ${name}%0Aالرقم: ${phone}`, '_blank');
            
            setTimeout(() => {
                const userCode = prompt("أدخل كود التفعيل الذي استلمته من الإدارة:");
                if (!userCode) return;

                if(userCode.endsWith("11") && userCode.length >= 4) {
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    if(users.find(u => u.phone === phone)) return alert("هذا الرقم مسجل مسبقاً!");

                    users.push({ name, phone, pass });
                    localStorage.setItem('users', JSON.stringify(users));
                    alert("تم التحقق بنجاح ✅");
                    show('login-page');
                } else {
                    alert("كود التفعيل غير صحيح!");
                }
            }, 1500);
        }
    }

    function checkLoginStatus() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(user) {
            document.getElementById('welcome-msg').innerText = "مرحباً بك، " + user.name;
            show('home');
        } else {
            show('login-page');
        }
    }

    function logout() {
        localStorage.removeItem('currentUser');
        location.reload();
    }

    function sendM() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const loc = document.getElementById('m-loc').value;
        const dev = document.getElementById('m-dev').value;
        const problem = document.getElementById('m-problem').value;

        if(!problem) return alert("يرجى وصف المشكلة!");

        const adminPhone = "249112002802";
        const msg = `*طلب صيانة جديد*%0A👤 *العميل:* ${user.name}%0A📞 *رقم الهاتف:* ${user.phone}%0A📍 *الحي:* ${loc}%0A🛠️ *الجهاز:* ${dev}%0A⚠️ *المشكلة:* ${problem}`;
        window.location.href = `https://wa.me/${adminPhone}?text=${msg}`;
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
