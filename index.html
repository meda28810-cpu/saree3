<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة Saree3 & Mushwar</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: right; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; font-weight: bold; cursor: pointer; border: none; }
        .call-btn { background-color: #3498db; color: white; padding: 12px; border-radius: 8px; text-decoration: none; display: block; text-align: center; font-weight: bold; cursor: pointer; }
        #codeSection { display: none; background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px dashed #ffa000; }
    </style>
</head>
<body>

<div class="container">
    <h2>منصة Saree3 & Mushwar</h2>

    <div class="section">
        <label>الأحياء المتاحة:</label>
        <select id="neighborhoods">
            <option>حي الروضة</option>
            <option>حي الخالدية</option>
            <option>حي النزهة</option>
            <option>حي المطار</option>
            <option>حي الصحافة</option>
        </select>

        <label>صيانة أجهزة:</label>
        <select id="appliances">
            <option>غسالات</option>
            <option>ثلاجات</option>
            <option>مكيفات</option>
            <option>أفران كهربائية</option>
            <option>شاشات وتلفزيونات</option>
        </select>
    </div>

    <div class="section">
        <h3>بيانات السائقين والاتصال</h3>
        <select id="driverSelect">
            <option value="">-- اختر سائقاً --</option>
            <option value="01012345678">أحمد محمد</option>
            <option value="01122334455">ياسين إبراهيم</option>
            <option value="01233445566">خالد عبد الله</option>
            <option value="01544556677">عمر فاروق</option>
        </select>

        <div id="actionArea" style="display:none;">
            <button onclick="handleContact()" class="call-btn">إجراء اتصال وإرسال واتساب</button>
        </div>
    </div>

    <div id="codeSection">
        <p>تم فتح الواتساب ولوحة الاتصال.. يرجى إدخال الكود المرسل أدناه:</p>
        <input type="text" id="verificationCode" placeholder="أدخل الكود هنا">
        <button onclick="alert('تم التحقق بنجاح!')" style="background-color: #f39c12;">تأكيد الكود</button>
    </div>
</div>

<script>
    const driverSelect = document.getElementById('driverSelect');
    const actionArea = document.getElementById('actionArea');
    const codeSection = document.getElementById('codeSection');

    driverSelect.onchange = function() {
        actionArea.style.display = this.value ? 'block' : 'none';
    };

    function handleContact() {
        const phone = driverSelect.value;
        const driverName = driverSelect.options[driverSelect.selectedIndex].text;
        const adminPhone = "201000000000"; // ضع رقمك هنا بصيغة دولية بدون +

        if (!phone) return;

        // 1. إظهار خانة الكود فوراً في الصفحة الأصلية
        codeSection.style.display = 'block';

        // 2. تحضير رسالة الواتساب
        const message = encodeURIComponent(`طلب خدمة جديد للسائق: ${driverName}. يرجى تأكيد الكود.`);
        const whatsappUrl = `https://api.whatsapp.com/send?phone=${adminPhone}&text=${message}`;

        // 3. فتح الواتساب في نافذة صغيرة (Pop-up) لكي لا يغادر الصفحة الأساسية
        const wpWindow = window.open(whatsappUrl, '_blank', 'width=600,height=600');

        // 4. فتح لوحة اتصال الهاتف في نفس اللحظة
        window.location.href = `tel:${phone}`;

        // اختياري: إذا أردت التركيز على الصفحة الأصلية بعد ثانية
        setTimeout(() => { window.focus(); }, 1000);
    }
</script>

</body>
</html>
