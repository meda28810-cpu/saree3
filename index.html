<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>SAREE3 | BRAZILI QQ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcc00; --dark: #0d1117; --card: #161b22; --blue: #007bff; --green: #28a745; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 10px; }
        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #30363d; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        h1 { color: var(--gold); font-size: 35px; margin: 10px 0; font-weight: 800; }
        h2 { font-size: 20px; margin-bottom: 15px; color: #eee; }

        input, select, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #444; background: #0d1117; color: white; 
            font-size: 16px; outline: none; box-sizing: border-box; font-family: 'Cairo';
        }

        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-gold:active { transform: scale(0.96); }
        
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 14px; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; margin-top: 15px; }

        .menu-card { background: var(--card); border: 1px solid #30363d; border-radius: 20px; padding: 25px; margin-bottom: 15px; cursor: pointer; }
        
        .driver-card { 
            background: #1c2128; padding: 15px; border-radius: 18px; 
            margin-bottom: 12px; border: 1px solid #333; border-right: 5px solid var(--blue);
            text-align: right;
        }
        
        .call-btn { 
            background: var(--green); color: white; padding: 12px 20px; 
            border-radius: 12px; cursor: pointer; font-weight: 800; font-size: 15px; border: none; margin-top: 8px; width: 100%;
        }

        #verify-section { display: none; background: rgba(255, 204, 0, 0.05); padding: 15px; border-radius: 15px; border: 1px dashed var(--gold); margin-top: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="login-page" class="page">
        <div class="container" style="margin-top: 40px;">
            <h1>SAREE3</h1>
            <h2>تسجيل الدخول</h2>
            <input type="text" id="login-phone" placeholder="رقم الهاتف">
            <input type="password" id="login-pass" placeholder="كلمة السر">
            <button class="btn btn-gold" onclick="login()">دخول ✅</button>
            <button class="btn-outline" onclick="show('register-page')">مستخدم جديد؟ أنشئ حساب</button>
        </div>
    </div>

    <div id="register-page" class="page">
        <div class="container">
            <h2 style="color: var(--gold);">عضوية جديدة</h2>
            <div id="reg-form">
                <input type="text" id="reg-name" placeholder="الاسم الكامل">
                <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
                <input type="password" id="reg-pass" placeholder="كلمة سر جديدة">
                <button class="btn btn-gold" onclick="startActivation()">طلب كود التفعيل (واتساب) 💬</button>
            </div>

            <div id="verify-section">
                <p style="color: var(--gold); font-size: 13px;">عُد إلى هنا وأدخل الكود فور استلامه من المطور:</p>
                <input type="number" id="v-code" placeholder="أدخل كود التفعيل">
                <button class="btn btn-gold" onclick="completeRegistration()">تأكيد ودخول ✅</button>
            </div>
            <button class="btn-outline" onclick="show('login-page')">رجوع</button>
        </div>
    </div>

    <div id="home" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
             <button onclick="logout()" style="background:none; color:#ff4444; border:none; font-weight:bold; cursor:pointer;">خروج ⬅️</button>
             <h1 style="font-size: 24px; margin: 0;">SAREE3</h1>
        </div>
        <p id="welcome-msg" style="color: var(--gold); font-weight: bold; margin-bottom: 20px;"></p>
        
        <div class="menu-card" onclick="show('m-page')">🛠️ <h3>خدمات الصيانة</h3></div>
        <div class="menu-card" onclick="show('trip-page')">🚕 <h3>مشوار</h3></div>
        
        <p style="font-size: 10px; color: #444; margin-top: 30px;">DEVELOPED BY BRAZILI QQ</p>
    </div>

    <div id="m-page" class="page">
        <div class="container">
            <button onclick="show('home')" style="float:right; color:var(--gold); background:none; border:none; font-size:20px;">🔙</button>
            <h2 style="color: var(--gold);">طلب صيانة</h2>
            <select id="m-loc">
                <option>حي المسجد العتيق</option><option>حي الرحمه</option>
                <option>حي فريق قدام</option><option>حي نادي الشعله</option>
                <option>حي نادي اتحاد الولي</option>
            </select>
            <select id="m-dev">
                <option>مكيف</option><option>ثلاجة</option><option>غسالة</option>
                <option>شاشة</option><option>فرن/ميكروويف</option>
            </select>
            <textarea id="m-problem" placeholder="صف العطل..."></textarea>
            <button class="btn btn-gold" onclick="sendM()">إرسال الطلب ✅</button>
        </div>
    </div>

    <div id="trip-page" class="page">
        <div class="container">
            <button onclick="show('home')" style="float:right; color:var(--gold); background:none; border:none; font-size:20px;">🔙</button>
            <h2 style="color: var(--blue);">دليل السائقين</h2>
            
            <div class="driver-card">
                <h4>عمر عبد الله</h4>
                <p>ركشة داخلية</p>
                <button class="call-btn" onclick="directCall('249121606445')">اتصال مباشر 📞</button>
            </div>

            <div class="driver-card">
                <h4>عبد الجليل يوسف</h4>
                <p>عربة (سفر)</p>
                <button class="call-btn" onclick="directCall('249117655646')">اتصال مباشر 📞</button>
            </div>

            <div class="driver-card">
                <h4>جابر عبد الجليل</h4>
                <p>حافلة ركاب</p>
                <button class="call-btn" onclick="directCall('249127879864')">اتصال مباشر 📞</button>
            </div>
        </div>
    </div>

<script>
    const MY_PHONE = "249112002802";

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // الدخول يعتمد على الجلسة فقط (سيطلب دخولاً جديداً عند إغلاق التطبيق)
    function login() {
        const phone = document.getElementById('login-phone').value;
        const pass = document.getElementById('login-pass').value;

        if(phone === "BRAZILI") {
            sessionStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({ name: "المطور 👑", phone: "DEV" }));
            checkLoginStatus(); return;
        }

        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.phone === phone && u.pass === pass);
        
        if(user) {
            sessionStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify(user));
            checkLoginStatus();
        } else {
            alert("خطأ في بيانات الدخول!");
        }
    }

    function checkLoginStatus() {
        const loggedIn = sessionStorage.getItem('isLoggedIn');
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(loggedIn === 'true' && user) {
            document.getElementById('welcome-msg').innerText = "مرحباً: " + user.name;
            show('home');
        } else {
            show('login-page');
        }
    }

    function logout() {
        sessionStorage.removeItem('isLoggedIn');
        location.reload();
    }

    // التفعيل مع خانة كود ثابتة
    function startActivation() {
        const name = document.getElementById('reg-name').value;
        const phone = document.getElementById('reg-phone').value;
        const pass = document.getElementById('reg-pass').value;

        if(!name || !phone || !pass) return alert("أكمل البيانات!");

        localStorage.setItem('tempUser', JSON.stringify({ name, phone, pass }));
        document.getElementById('reg-form').style.display = 'none';
        document.getElementById('verify-section').style.display = 'block';

        const msg = `طلب تفعيل%0Aالاسم: ${name}%0Aالرقم: ${phone}`;
        window.open(`https://wa.me/${MY_PHONE}?text=${msg}`, '_blank');
    }

    function completeRegistration() {
        const code = document.getElementById('v-code').value;
        const tempUser = JSON.parse(localStorage.getItem('tempUser'));

        if(code && code.endsWith("11")) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push(tempUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.removeItem('tempUser');
            alert("تم التفعيل! سجل دخولك الآن");
            location.reload();
        } else { alert("الكود خطأ!"); }
    }

    // مكالمة مباشرة فقط كما طلبت
    function directCall(phone) {
        window.location.href = `tel:${phone}`;
    }

    // إرسال طلب الصيانة لك
    function sendM() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const msg = `*طلب صيانة*%0Aالعميل: ${user.name}%0Aالحي: ${document.getElementById('m-loc').value}%0Aالجهاز: ${document.getElementById('m-dev').value}%0Aالعطل: ${document.getElementById('m-problem').value}`;
        window.location.href = `https://wa.me/${MY_PHONE}?text=${msg}`;
    }
</script>
</body>
</html>
