<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>SAREE3 | سريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --dark: #0d1117; --card: #161b22; --blue: #007bff; --green: #28a745; --red: #ff4444; --purple: #8e44ad; --chat: #21262d; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 10px; transition: 0.3s; }
        .page { display: none; animation: fadeIn 0.4s; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 32px; margin: 10px 0; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #444; background: #0d1117; color: white; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 800; font-size: 17px; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: black; }
        
        /* شريط التطبيق العلوي */
        .app-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; margin-bottom: 10px; }
        .icon-btn { background: #30363d; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--gold); font-size: 18px; color: var(--gold); }
        
        /* القائمة */
        .menu-card { background: var(--card); border: 1px solid #30363d; border-radius: 20px; padding: 18px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; gap: 15px; text-align: right; }
        .menu-card h3 { margin: 0; font-size: 17px; }

        /* نظام الدردشة */
        #chat-box { height: 350px; overflow-y: auto; background: var(--chat); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; border: 1px solid #30363d; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; text-align: right; line-height: 1.4; }
        .msg-other { background: #30363d; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-me { background: var(--blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-sender { font-size: 10px; font-weight: bold; color: var(--gold); display: block; margin-bottom: 4px; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { margin: 0; flex-grow: 1; }
        .send-chat-btn { background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; cursor: pointer; font-size: 20px; }

        /* السائقين ودليل الخير */
        .driver-card, .item-row { background: #1c2128; padding: 12px; border-radius: 15px; margin-bottom: 8px; border-right: 4px solid var(--blue); display: flex; justify-content: space-between; align-items: center; text-align: right; }
        .call-btn, .mini-btn { padding: 6px 12px; border-radius: 10px; border: none; font-family: 'Cairo'; cursor: pointer; font-weight: bold; }
        .call-btn { background: var(--green); color: white; }
        .btn-need { background: var(--red); color: white; } .btn-give { background: var(--green); color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="profile-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1001; background:var(--card); padding:20px; border-radius:20px; border:1px solid var(--gold); width:80%;">
        <h3 style="color:var(--gold)">بيانات الحساب</h3>
        <p>الاسم: <span id="p-name"></span></p>
        <p>الهاتف: <span id="p-phone"></span></p>
        <button class="btn btn-gold" onclick="document.getElementById('profile-modal').style.display='none'">إغلاق</button>
        <button class="btn" style="color:var(--red)" onclick="logout()">خروج</button>
    </div>

    <div id="home" class="page">
        <div class="app-bar">
            <div class="icon-btn" onclick="document.getElementById('profile-modal').style.display='block'">👤</div>
            <h1 style="font-size:24px; color:var(--gold);">SAREE3</h1>
            <div class="icon-btn" onclick="toggleLang()" id="lang-btn">EN</div>
        </div>
        
        <div class="menu-card" onclick="show('chat-page')" style="background: #1c2128; border: 1px solid var(--green);">
            <span style="font-size:25px;">💬</span> <div><h3 style="color:var(--green)">الدردشة العامة</h3><p style="margin:0; font-size:11px; color:#888">تواصل مع أهل المنطقة الآن</p></div>
        </div>

        <div class="menu-card" onclick="show('m-page')" style="border-right: 5px solid var(--gold);"><span>🛠️</span> <h3 id="txt-m-serv">خدمات الصيانة</h3></div>
        <div class="menu-card" onclick="show('trip-page')" style="border-right: 5px solid var(--blue);"><span>🚕</span> <h3 id="txt-trip-serv">مشوار (السائقين)</h3></div>
        <div class="menu-card" onclick="show('health-page')" style="border-right: 5px solid var(--red);"><span>🏥</span> <h3 id="txt-health-serv">الخدمات الطبية</h3></div>
        <div class="menu-card" onclick="show('khair-page')" style="border-right: 5px solid var(--purple);"><span>🤝</span> <h3 id="txt-khair-serv">دليل الخير</h3></div>
    </div>

    <div id="chat-page" class="page">
        <div class="container" style="padding: 10px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <button onclick="show('home')" style="color:var(--gold); background:none; border:none; font-size:20px; cursor:pointer">🔙</button>
                <h3 style="margin:0">الدردشة العامة (الديوان)</h3>
                <span style="font-size:10px; color:var(--green)">متصل الآن 🟢</span>
            </div>
            
            <div id="chat-box">
                </div>

            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="اكتب رسالة...">
                <button class="send-chat-btn" onclick="sendChatMessage()">📤</button>
            </div>
        </div>
    </div>

    <div id="trip-page" class="page">
        <div class="container">
            <button onclick="show('home')" style="float:right; border:none; background:none; color:var(--gold); font-size:20px">🔙</button>
            <h2 style="color:var(--blue)">دليل السائقين</h2>
            <div class="driver-card"><div class="driver-info"><h4>عبد الجليل يوسف</h4><p>عربة سفر</p></div><button class="call-btn" onclick="directCall('249117655646')">اتصال</button></div>
            <div class="driver-card"><div class="driver-info"><h4>جابر عبد الجليل</h4><p>حافلة ركاب</p></div><button class="call-btn" onclick="directCall('249127879864')">اتصال</button></div>
        </div>
    </div>

    <div id="login-page" class="page"><div class="container"><h1>SAREE3</h1><input type="text" id="login-phone" placeholder="رقم الهاتف"><input type="password" id="login-pass" placeholder="كلمة السر"><button class="btn btn-gold" onclick="login()">دخول</button></div></div>

<script>
    const MY_PHONE = "249112002802";
    let currentLang = 'AR';

    function show(id) { 
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); 
        document.getElementById(id).style.display = 'block';
        if(id === 'chat-page') loadMessages();
    }

    // نظام الدردشة (محاكاة التزامن)
    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(!input.value.trim()) return;

        const msgObj = {
            sender: user.name,
            text: input.value,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            me: true
        };

        let messages = JSON.parse(localStorage.getItem('global_chat') || '[]');
        messages.push(msgObj);
        localStorage.setItem('global_chat', JSON.stringify(messages));
        
        input.value = '';
        loadMessages();
    }

    function loadMessages() {
        const chatBox = document.getElementById('chat-box');
        const user = JSON.parse(localStorage.getItem('currentUser'));
        let messages = JSON.parse(localStorage.getItem('global_chat') || '[]');
        
        chatBox.innerHTML = messages.map(m => `
            <div class="msg ${m.sender === user.name ? 'msg-me' : 'msg-other'}">
                <span class="msg-sender">${m.sender === user.name ? 'أنا' : m.sender}</span>
                ${m.text}
                <div style="font-size:8px; opacity:0.6; margin-top:4px">${m.time}</div>
            </div>
        `).join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // تكرار تحميل الرسائل كل 3 ثوانٍ (محاكاة الربط بالسيرفر)
    setInterval(() => { if(document.getElementById('chat-page').style.display === 'block') loadMessages(); }, 3000);

    // بقية وظائف النظام
    function login() {
        const phone = document.getElementById('login-phone').value;
        if(phone === "BRAZILI") { 
            localStorage.setItem('currentUser', JSON.stringify({name:"المطور 👑", phone:"ADMIN"}));
            sessionStorage.setItem('isLoggedIn', 'true'); checkLoginStatus(); return;
        }
        localStorage.setItem('currentUser', JSON.stringify({name:"مستخدم جديد", phone:phone}));
        sessionStorage.setItem('isLoggedIn', 'true'); checkLoginStatus();
    }

    function checkLoginStatus() {
        if(sessionStorage.getItem('isLoggedIn') === 'true') {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            document.getElementById('p-name').innerText = user.name;
            document.getElementById('p-phone').innerText = user.phone;
            show('home');
        } else { show('login-page'); }
    }

    function logout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }
    function directCall(p) { window.location.href = `tel:${p}`; }
</script>
</body>
</html>
