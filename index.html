
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سريع | SAREE3 - نظام BRAZILI</title>
    <style>
        :root {
            --gold: #d4a017;
            --green: #2d5a27;
            --dark: #121212;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hero {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1581092160562-40aa08e78837?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60');
            background-size: cover;
            padding: 40px 20px;
            border-bottom: 3px solid var(--green);
        }
        .container {
            max-width: 450px;
            margin: -30px auto 20px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        label { display: block; text-align: right; margin: 15px 0 5px; font-weight: bold; color: var(--gold); }
        select, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box;
        }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .pay-card {
            background: #2a2a2a; border: 2px solid transparent; border-radius: 15px;
            padding: 10px; cursor: pointer; transition: 0.3s;
        }
        .pay-card.active { border-color: var(--gold); background: #333; box-shadow: 0 0 10px var(--gold); }
        .pay-card img { width: 40px; height: 40px; border-radius: 8px; margin-bottom: 5px; }
        .btn-send {
            width: 100%; padding: 15px; background: var(--green); color: white;
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold;
            margin-top: 25px; cursor: pointer;
        }
        .btn-maps {
            background: #34a853; font-size: 14px; padding: 10px; margin-top: 10px;
            border-radius: 8px; text-decoration: none; display: inline-block; color: white;
        }
        .qr-section { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size: 12px;">✅ نظام BRAZILI</div>
    <div style="font-weight: bold; color: var(--gold); font-size: 20px;">سريع | SAREE3</div>
</div>

<div class="hero">
    <h2>خدمة صيانة الولي والحلاوين</h2>
    <p>سرعة . جودة . أمان</p>
</div>

<div class="container">
    <label>المنطقة / الحي السكني:</label>
    <select id="loc">
        <option>-- حدد المنطقة --</option>
        <option>الولي</option>
        <option>الحلاوين</option>
        <option>أم حمد</option>
        <option>القوز</option>
    </select>

    <label>وصف العطل بالتفصيل (اختياري):</label>
    <textarea id="desc" rows="3" placeholder="... اكتب وصفاً موجزاً للمشكلة"></textarea>

    <label>طريقة الدفع المتوفرة:</label>
    <div class="payment-grid">
        <div class="pay-card" onclick="selectPay(this, 'نقداً')">
            <div style="font-size: 24px;">💵</div>
            <div>نقداً</div>
        </div>
        <div class="pay-card" onclick="selectPay(this, 'بنكك')">
            <div style="font-size: 24px;">🏦</div>
            <div>بنكك</div>
        </div>
        <div class="pay-card" onclick="selectPay(this, 'أوكاش')">
            <div style="font-size: 24px;">📱</div>
            <div>أوكاش</div>
        </div>
    </div>

    <button class="btn-send" onclick="send()">إرسال الطلب عبر واتساب ✅</button>
    
    <a href="https://maps.google.com" target="_blank" class="btn-maps">📍 تحديد موقعنا على الخريطة (Google Maps)</a>

    <div class="qr-section">
        <p style="font-size: 14px; color: var(--gold);">👇 مسح الرمز للوصول السريع</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://meda28810-cpu.github.io/saree3/" alt="QR Code">
    </div>
</div>

<script>
    let selectedPayment = "غير محدد";
    function selectPay(element, method) {
        document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        selectedPayment = method;
    }

    function send() {
        const location = document.getElementById('loc').value;
        const description = document.getElementById('desc').value;
        const phone = "249123456789"; // ضع رقمك هنا
        
        const text = `*طلب صيانة جديد (سريع)*%0A📍 المنطقة: ${location}%0A🛠️ الوصف: ${description}%0A💰 الدفع: ${selectedPayment}%0A------------------%0A_تطوير نظام BRAZILI_`;
        window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }
</script>

</body>
</html>
