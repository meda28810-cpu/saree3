<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAREE3 | BRAZILI QQ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcc00; --dark: #0d1117; --card: #161b22; --blue: #007bff; --green: #28a745; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid #30363d; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { color: var(--gold); font-size: 50px; margin-bottom: 5px; font-weight: 900; }
        .btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; font-size: 22px; cursor: pointer; margin-top: 15px; }
        .btn-gold { background: var(--gold); color: black; }
        .driver-card { background: #1c2128; padding: 20px; border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #333; border-right: 5px solid var(--blue); }
        .call-btn { background: var(--green); color: white; padding: 12px 20px; border-radius: 15px; cursor: pointer; font-weight: 900; font-size: 18px; border: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="checkLoginStatus()">

    <div id="trip-page" class="page">
        <div class="container">
            <button onclick="show('home')" style="background:none; color:var(--gold); border:none; float:right; cursor:pointer;">🔙 رجوع</button>
            <div style="clear:both;"></div>
            <h2 style="color: var(--blue); font-size: 32px;">دليل المشاوير الذكي</h2>
            <div style="text-align: right;">
                <h3 style="color: var(--gold);">📍 مشاوير داخلية</h3>
                <div class="driver-card">
                    <div><h4>عمر عبد الله</h4><p>ركشة</p></div>
                    <button class="call-btn" onclick="realCall('عمر عبد الله', '249121606445')">📞 طلب واتصال</button>
                </div>

                <h3 style="color: var(--gold);">🏙️ سفر الحصاحيصا</h3>
                <div class="driver-card">
                    <div><h4>عبد الجليل يوسف</h4><p>ACCENT</p></div>
                    <button class="call-btn" onclick="realCall('عبد الجليل يوسف', '249117655646')">📞 طلب واتصال</button>
                </div>
                <div class="driver-card">
                    <div><h4>جابر عبد الجليل</h4><p>حافلة</p></div>
                    <button class="call-btn" onclick="realCall('جابر عبد الجليل', '249127879864')">📞 طلب واتصال</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const MY_PHONE = "249112002802";

    // الوظيفة السحرية الجديدة للاتصال الحقيقي والرسائل
    function realCall(driverName, driverPhone) {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const userName = user ? user.name : "عميل جديد";
        
        // 1. رسائل الواتساب
        const myMsg = `📢 *تنبيه مطور*%0Aالعميل: ${userName}%0Aيتصل الآن بالسائق: ${driverName}`;
        const driverMsg = `👋 *طلب مشوار من تطبيق سريع*%0Aأنا العميل ${userName}، أحتاج لمشوار وسأقوم بالاتصال بك الآن.`;

        alert("سيتم إرسال طلبك للإدارة والسائق أولاً، ثم سيفتح الهاتف لوحة الاتصال تلقائياً ✅");

        // إرسال التنبيه للمطور (أنت) في خلفية
        window.open(`https://wa.me/${MY_PHONE}?text=${myMsg}`, '_blank');

        // إرسال الرسالة للسائق
        setTimeout(() => {
            window.open(`https://wa.me/${driverPhone}?text=${driverMsg}`, '_blank');
        }, 1000);

        // فتح الاتصال الحقيقي بالسائق بعد ثانيتين
        setTimeout(() => {
            window.location.href = `tel:${driverPhone}`;
        }, 2500);
    }

    // ... باقي وظائف تسجيل الدخول والحفظ السابقة ...
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function checkLoginStatus() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(user) show('home'); else show('login-page');
    }
</script>
</body>
</html>
