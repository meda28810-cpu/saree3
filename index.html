<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سريع - خدمات الولي</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; }
        body { font-family: 'Tajawal', sans-serif; background: var(--black); color: white; margin: 0; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid var(--gold); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        h2 { color: var(--gold); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .section-title { font-size: 1.2rem; color: #fff; background: #333; padding: 5px 10px; border-radius: 5px; margin: 20px 0 10px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid var(--gold); background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>نظام سريع - المطور BRAZILI</h2>

    <div class="card">
        <h3>🚗 قسم المواصلات</h3>
        
        <div class="section-title">🚌 مواصلات السفر (خارج الولي)</div>
        <div class="card">
            <strong>سائق: محمد أحمد (دفار)</strong><br>
            📞 0912345678 <br>
            <button class="btn" onclick="window.location.href='tel:0912345678'">اتصال الآن</button>
        </div>

        <div class="section-title">🛺 مواصلات داخلية (داخل الولي)</div>
        <div class="card">
            <strong>سائق: علي عثمان (ركشة)</strong><br>
            📞 0123456789 <br>
            <button class="btn" onclick="window.location.href='tel:0123456789'">اتصال الآن</button>
        </div>
    </div>

    <div class="card">
        <h3>🏥 حجز المركز الصحي</h3>
        <input type="text" id="patientName" placeholder="اسم المريض">
        <select id="clinicDept">
            <option value="الطب العام">الطب العام</option>
            <option value="المختبر">المختبر</option>
            <option value="التطعيم">التطعيم</option>
        </select>
        <button class="btn" onclick="sendHealthBooking()">إرسال كرت الحجز عبر الواتساب</button>
    </div>

    <script>
        function sendHealthBooking() {
            const name = document.getElementById('patientName').value;
            const dept = document.getElementById('clinicDept').value;
            const roleNum = Math.floor(Math.random() * 50) + 1; // رقم دور عشوائي للتجربة
            
            if(!name) { alert("الرجاء كتابة اسم المريض"); return; }

            const message = `*مركز صحي الولي - كرت حجز*%0A` +
                            `--------------------%0A` +
                            `🔢 *رقم الدور:* (${roleNum})%0A` +
                            `👤 *المريض:* ${name}%0A` +
                            `🩺 *القسم:* ${dept}%0A` +
                            `--------------------%0A` +
                            `إلى المسجل: *أحمد*%0A` +
                            `_نظام سريع للصحة_`;
            
            // رقم واتساب المركز (يمكنك تغييره لرقمك للتجربة)
            const whatsappUrl = `https://wa.me/249912345678?text=${message}`;
            window.location.href = whatsappUrl;
        }
    </script>
</body>
</html>
