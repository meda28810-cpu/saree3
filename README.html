<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سريع | SAREE3 - صيانة الولي والحلاوين</title>
    <style>
        :root {
            --primary: #d4a017; /* ذهبي */
            --secondary: #2d5a27; /* أخضر غامق */
            --accent: #c0392b; /* أحمر */
            --bg: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9em; }
        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #3e7d37; transform: scale(1.02); }
        .footer { margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="container">
    <h1>سريع | SAREE3</h1>
    <p>خدمات الصيانة المنزلية - الولي والحلاوين</p>
    <hr style="border: 0.5px solid #444; margin: 20px 0;">

    <label>إختر المنطقة:</label>
    <select id="location">
        <option value="الولي">الولي</option>
        <option value="الحلاوين">الحلاوين</option>
        <option value="القوز">القوز</option>
        <option value="أم حمد">أم حمد</option>
        <option value="بحر العلوم">بحر العلوم</option>
        <option value="شكيرة">شكيرة</option>
    </select>

    <label>نوع الجهاز:</label>
    <select id="device">
        <option value="مكيف">مكيف</option>
        <option value="ثلاجة">ثلاجة</option>
        <option value="غسالة">غسالة</option>
        <option value="شاشة">شاشة</option>
        <option value="أخرى">أخرى</option>
    </select>

    <label>طريقة الدفع المفضلة:</label>
    <select id="payment">
        <option value="كاش">كاش</option>
        <option value="تطبيق بنكك">تطبيق بنكك</option>
        <option value="أوكاش">أوكاش</option>
    </select>

    <button onclick="sendOrder()">إرسال الطلب عبر واتساب ✅</button>
    
    <div class="footer">تطوير بواسطة BRAZILI © 2026</div>
</div>

<script>
    function sendOrder() {
        const loc = document.getElementById('location').value;
        const dev = document.getElementById('device').value;
        const pay = document.getElementById('payment').value;
        const phone = "249123456789"; // ضع رقمك هنا بدلاً من هذا الرقم

        const message = `*طلب صيانة جديد (منصة سريع)*%0A--------------------%0A📍 *المنطقة:* ${loc}%0A🛠️ *الجهاز:* ${dev}%0A💰 *الدفع:* ${pay}%0A--------------------%0A_تم الإرسال عبر نظام BRAZILI_`;
        
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
